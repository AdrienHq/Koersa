server {
    listen 80;
    server_name _;
    root /app/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Only the front controller is executable; pass it to PHP-FPM.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app/public/index.php;
        fastcgi_param DOCUMENT_ROOT /app/public;
        internal;
    }

    # Reject any other PHP file to avoid executing uploaded scripts.
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/koersa_error.log;
    access_log /var/log/nginx/koersa_access.log;
}
