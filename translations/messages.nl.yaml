report:
    title: "Belgisch fiscaal rapport — inkomstenjaar %year%"
    account_label: "Account"
    generated_label: "Gegenereerd"
    summary_title: "Samenvatting"
    methodology_title: "Methodologie"
    methodology_body: "Gerealiseerde meerwaarden worden FIFO berekend over de transactiegeschiedenis. Elk leg wordt omgerekend naar EUR aan de referentiekoers van de Europese Centrale Bank op de transactiedatum. Verkopen die de bij Koersa bekende lots overstijgen worden gemarkeerd en uitgesloten van de totalen."
    footer: "Gegenereerd door Koersa · koersa.be · %date%"

tax_filing:
    speculative:
        box: "Vak XV — Afdeling 1.A (Occasionele baten en winsten)"
        codes: "Code 1440 / 2440 (belastbaar bedrag) — Code 1441 / 2441 (aftrekbare kosten)"
        note: "Vul de meerwaarde in EUR in — de FOD past de 33 % toe. Codes 1440 / 1441 gelden voor belastingplichtige 1; codes 2440 / 2441 voor belastingplichtige 2 (echtgenoot) bij een gezamenlijke aangifte."
    normal_management:
        note: "Geen aangifte vereist voor meerwaarden onder het normaal beheer van het privévermogen."
    professional:
        note: "Waar dit op de aangifte komt, hangt af van uw statuut (werknemer met bijberoep, zelfstandige onder ‘winsten’ of ‘baten’, vennootschapsstructuur…) en van de aard van de activiteit. Vak XVII ‘winsten en baten’ is doorgaans het startpunt — vraag uw accountant naar de juiste vakken."
    unsupported_year:
        note: "Koersa biedt voor dit inkomstenjaar nog geen geverifieerde codes. Raadpleeg de documentatie van de FOD Financiën voor de geldige codes."

