report:
    title: "Rapport fiscal belge — revenus %year%"
    account_label: "Compte"
    generated_label: "Généré"
    summary_title: "Synthèse"
    methodology_title: "Méthodologie"
    methodology_body: "Les plus-values réalisées sont calculées en FIFO sur l'historique des transactions. Chaque opération est convertie en EUR au taux de référence publié par la Banque centrale européenne à la date de la transaction. Les ventes qui dépassent les lots connus par Koersa sont signalées et exclues des totaux."
    footer: "Généré par Koersa · koersa.be · %date%"

tax_filing:
    speculative:
        box: "Cadre XV — Section 1.A (Bénéfices et profits occasionnels)"
        codes: "Code 1440 / 2440 (montant imposable) — Code 1441 / 2441 (frais déductibles)"
        note: "Indiquez la plus-value en EUR — le SPF applique les 33 %. Les codes 1440 / 1441 concernent le contribuable 1 ; les codes 2440 / 2441 concernent le contribuable 2 (conjoint) en déclaration conjointe."
    normal_management:
        note: "Aucune déclaration n'est requise pour les plus-values relevant de la gestion normale du patrimoine privé."
    professional:
        note: "L'emplacement dans la déclaration dépend de votre statut (salarié avec activité accessoire, indépendant en ‘bénéfices’ ou ‘profits’, structure sociétaire…) et de la qualification de l'activité. Le Cadre XVII ‘bénéfices et profits’ est généralement le point de départ — demandez à votre comptable les bonnes cases."
    unsupported_year:
        note: "Koersa ne fournit pas encore de codes vérifiés pour cette année de revenus. Consultez la documentation du SPF Finances pour les codes applicables."

