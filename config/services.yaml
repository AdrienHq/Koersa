# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    Koersa\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            # Domain objects and Doctrine entities are not services.
            - '../src/**/Domain/'
            - '../src/**/Doctrine/Entity/'

    # EventSauce has no bundle, so the Portfolio event store is wired by hand.
    EventSauce\EventSourcing\Serialization\ConstructingMessageSerializer: ~
    EventSauce\EventSourcing\Serialization\MessageSerializer:
        alias: EventSauce\EventSourcing\Serialization\ConstructingMessageSerializer

    EventSauce\EventSourcing\MessageRepository:
        alias: Koersa\Portfolio\Infrastructure\EventSourcing\DoctrineMessageRepository

    EventSauce\EventSourcing\MessageDispatcher:
        class: EventSauce\EventSourcing\SynchronousMessageDispatcher
        arguments:
            - '@Koersa\Portfolio\Infrastructure\Projection\TransactionProjector'
