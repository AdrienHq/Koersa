doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'

        # Tables not managed by the ORM (the messenger transport and the
        # hand-rolled event store) are kept out of diff/schema commands so they
        # are never proposed for dropping. They are owned by explicit migrations.
        schema_filter: '~^(?!messenger_messages$|portfolio_event_store$)~'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        # Per-context attribute mappings. Entities live in the Infrastructure
        # layer to keep the Domain free of ORM concerns. Portfolio is
        # event-sourced and mapped separately; Shared holds value objects.
        mappings:
            IAM:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/IAM/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'Koersa\IAM\Infrastructure\Persistence\Doctrine\Entity'
                alias: IAM
            Portfolio:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Portfolio/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'Koersa\Portfolio\Infrastructure\Persistence\Doctrine\Entity'
                alias: Portfolio
            Shared:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Shared/Infrastructure/Persistence/Doctrine/Entity'
                prefix: 'Koersa\Shared\Infrastructure\Persistence\Doctrine\Entity'
                alias: Shared

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
