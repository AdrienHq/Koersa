framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'

        default_bus: messenger.bus.default

        buses:
            # Commands are handled synchronously and wrapped in a Doctrine
            # transaction, so appending events to the store and updating the
            # projections either both commit or both roll back.
            messenger.bus.default:
                middleware:
                    - doctrine_transaction

        routing:
            # Sync for now (no worker running); switch to async at deploy time.
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async
